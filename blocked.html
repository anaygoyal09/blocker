<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stillness</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="chip">Pause</p>
        <h1 id="title">This is not what you actually wanted.</h1>
        <p id="message" class="message"></p>

        <div class="destination">
          <span>Attempted destination</span>
          <strong id="destination-label"></strong>
        </div>

        <div class="actions">
          <button id="back-button" class="primary-button" type="button">Return to your previous page</button>
          <button id="close-button" class="secondary-button" type="button">Close this tab</button>
        </div>

        <div class="reflection">
          <p class="reflection-label">A better question</p>
          <p id="reflection-text"></p>
        </div>
      </section>
    </main>

    <script src="blocked.js" type="module"></script>
  </body>
  </html>
